000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163" x="49" y="266.0278">Confirms skill assignment</text><line style="stroke:#181818;stroke-width:1.0;" x1="312" x2="354" y1="300.2266" y2="300.2266"/><line style="stroke:#181818;stroke-width:1.0;" x1="354" x2="354" y1="300.2266" y2="313.2266"/><line style="stroke:#181818;stroke-width:1.0;" x1="313" x2="354" y1="313.2266" y2="313.2266"/><polygon fill="#181818" points="323,309.2266,313,313.2266,323,317.2266,319,313.2266" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="319" y="295.1606">7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194" x="332" y="295.1606">Assigns Skill(s) to Collaborator</text><polygon fill="#181818" points="40,338.3594,30,342.3594,40,346.3594,36,342.3594" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="34" x2="306" y1="342.3594" y2="342.3594"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9" x="46" y="337.2935">8</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236" x="59" y="337.2935">Displays operation success message</text><!--MD5=[43687310f7412e08f1d3b537e5e2c0d8]
@startuml
skinparam monochrome true
skinparam packageStyle rectangle
skinparam shadowing false

autonumber

actor "HRM" as HRManager
participant ":System" as System

activate HRManager

HRManager -> System : Provides Collaborator ID
activate System

System - -> HRManager : Validates Collaborator ID
deactivate System

HRManager -> System : Types Skill Name(s) to assign
activate System

System -> System : Verifies if Skill(s) exist and are not already assigned
System - -> HRManager : Confirms skill assignment is possible
deactivate System

HRManager -> System : Confirms skill assignment
activate System

System -> System : Assigns Skill(s) to Collaborator
System - -> HRManager : Displays operation success message

deactivate System
@enduml

